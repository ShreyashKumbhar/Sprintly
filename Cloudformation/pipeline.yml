AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CI/CD stack for Sprintly using CodeStar connection, CodeBuild and CodePipeline.
  Builds backend + frontend, deploys backend via CodeDeploy, and publishes frontend
  assets to S3 with CloudFront invalidation.

Parameters:
  GitHubRepository:
    Type: String
    Description: GitHub repository in owner/name format
  GitHubBranch:
    Type: String
    Default: main
  ConnectionName:
    Type: String
    Default: sprintly-github-connection
  FrontendBucketName:
    Type: String
  CloudFrontDistributionId:
    Type: String
  BackendApiUrl:
    Type: String

Resources:
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub sprintly-pipeline-artifacts-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Ref ConnectionName
      ProviderType: GitHub

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sprintly-codepipeline-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                Resource:
                  - !Sub ${PipelineArtifactBucket.Arn}
                  - !Sub ${PipelineArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt SprintlyBuildProject.Arn
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetApplication
                  - codedeploy:GetDeploymentGroup
                Resource: '*'
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CodeBuildRole.Arn

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sprintly-codebuild-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !Sub arn:aws:s3:::${FrontendBucketName}
                  - !Sub arn:aws:s3:::${FrontendBucketName}/*
                  - !Sub ${PipelineArtifactBucket.Arn}
                  - !Sub ${PipelineArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: '*'

  SprintlyBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: sprintly-build-project
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: FRONTEND_BUCKET_NAME
            Value: !Ref FrontendBucketName
          - Name: CLOUDFRONT_DISTRIBUTION_ID
            Value: !Ref CloudFrontDistributionId
          - Name: VITE_API_BASE_URL
            Value: !Ref BackendApiUrl
      Source:
        Type: CODEPIPELINE
      TimeoutInMinutes: 60

  SprintlyPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: sprintly-ci-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Ref GitHubRepository
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: BuildAndPackage
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref SprintlyBuildProject
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: DeployBackend
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: '1'
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ApplicationName: !ImportValue sprintly-codedeploy-application-name
                DeploymentGroupName: !ImportValue sprintly-codedeploy-deployment-group-name
              RunOrder: 1

Outputs:
  PipelineName:
    Description: Name of Sprintly CodePipeline
    Value: !Ref SprintlyPipeline
    Export:
      Name: sprintly-pipeline-name
